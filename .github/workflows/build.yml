name: Build GenZFlow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.2.app
      - name: Create Config.swift from example
        run: cp GenZFlow/Config.example.swift GenZFlow/Config.swift
      - name: Resolve Swift packages
        run: swift package resolve
      - name: Build
        run: swift build -c release
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GenZFlow
          path: .build/release/GenZFlow
