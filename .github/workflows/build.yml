name: Build GenZFlow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode
      
      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version
          swift --version
      
      - name: Create Config.swift from example
        run: cp GenZFlow/Config.example.swift GenZFlow/Config.swift
      
      - name: Resolve Swift packages
        run: swift package resolve
      
      - name: Build
        run: swift build -c release 2>&1 | head -100
      
      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GenZFlow
          path: .build/release/GenZFlow
